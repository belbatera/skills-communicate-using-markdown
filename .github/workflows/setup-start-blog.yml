name: Setup start-blog branch

on:
  push:
    branches:
      - copilot/about-myself-page
    paths:
      - "day-1.md"

permissions:
  contents: write

jobs:
  create-start-blog:
    name: Create start-blog branch with day-1.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: copilot/about-myself-page

      - name: Create start-blog branch via API
        run: |
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/git/refs \
            -X POST \
            -f "ref=refs/heads/start-blog" \
            -f "sha=$SHA" \
            || gh api repos/${{ github.repository }}/git/refs/heads/start-blog \
              -X PATCH \
              -f "sha=$SHA" \
              -f "force=true"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
